<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextN-Digital – QR névjegykártya & mini weboldal</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
    }

    body{
      background:radial-gradient(circle at top,#2b2b2b,#050505);
      color:#f7f7f7;
    }

    a{text-decoration:none;color:inherit;}

    .wrapper{
      max-width:1100px;
      margin:0 auto;
      padding:0 16px 40px;
    }

    .accent{ color:#FFD700; }

    /* NAV */
    header{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(5,5,5,0.96);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,215,0,0.35);
      box-shadow:0 4px 18px rgba(0,0,0,0.7);
    }
    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 0;
      gap:12px;
    }

    .nav-brand{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:190px;
    }

    .nav-logo{
      height:26px;
      width:auto;
      display:block;
      border-radius:6px;
    }

    .logo-text{
      font-weight:bold;
      letter-spacing:1px;
      color:#FFD700;
      text-transform:uppercase;
      font-size:0.95rem;
      white-space:nowrap;
    }

    .nav-center{
      display:flex;
      flex:1;
      justify-content:center;
    }
    .nav-links{
      display:flex;
      gap:18px;
      font-size:0.9rem;
      flex-wrap:wrap;
      justify-content:center;
    }
    .nav-links a{ opacity:0.85; }
    .nav-links a:hover{
      opacity:1;
      color:#FFE88A;
    }

    /* Nyelvválasztó */
    .lang-switch{
      display:flex;
      gap:6px;
      min-width:110px;
      justify-content:flex-end;
    }
    .lang-btn{
      border-radius:999px;
      padding:4px 9px;
      font-size:0.75rem;
      border:1px solid rgba(255,215,0,0.4);
      background:rgba(10,10,10,0.95);
      color:#f5f5f5;
      cursor:pointer;
    }
    .lang-btn.active{
      background:#FFD700;
      color:#201500;
      font-weight:bold;
      box-shadow:0 0 10px rgba(255,215,0,0.8);
      border-color:#FFD700;
    }

    /* HERO */
    .hero{
      padding:40px 0 32px;
      display:grid;
      grid-template-columns:1.2fr 1fr;
      gap:32px;
      align-items:center;
    }

    @media (max-width: 800px){
      .hero{
        grid-template-columns:1fr;
        text-align:center;
      }
      .nav{ flex-wrap:wrap; }
      .nav-center{ order:3; width:100%; }
      .nav-brand{ justify-content:center; width:100%; }
      .lang-switch{ justify-content:center; width:100%; }
    }

    .hero-title{
      font-size:2.3rem;
      margin-bottom:12px;
      line-height:1.15;
    }
    .hero-sub{
      font-size:1rem;
      color:#d6d6d6;
      margin-bottom:20px;
    }
    .hero-badges{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }
    .badge{
      font-size:0.75rem;
      padding:4px 9px;
      border-radius:999px;
      border:1px solid rgba(255,215,0,0.7);
      color:#FFE88A;
      background:rgba(10,10,10,0.85);
    }

    .hero-cta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .btn-primary{
      background:linear-gradient(135deg,#FFE48A,#C8A200);
      color:#211600;
      padding:10px 18px;
      border-radius:999px;
      font-weight:bold;
      font-size:0.95rem;
      border:none;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
      box-shadow:0 0 18px rgba(255,215,0,0.85);
    }
    .btn-secondary{
      border-radius:999px;
      padding:9px 16px;
      border:1px solid rgba(180,180,180,0.7);
      font-size:0.9rem;
      background:rgba(10,10,10,0.9);
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
      color:#f0f0f0;
    }
    .btn-primary:hover{ filter:brightness(1.05); }
    .btn-secondary:hover{ border-color:#FFD700; }

    /* ÚJ: e-mail ajánlatkérés gomb (kosár helyett) */
    .btn-offer{
      border-radius:999px;
      padding:10px 18px;
      border:1px solid rgba(255,215,0,0.7);
      background:rgba(10,10,10,0.92);
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:6px;
      color:#FFE88A;
      font-weight:bold;
      font-size:0.92rem;
      box-shadow:0 0 14px rgba(255,215,0,0.25);
    }
    .btn-offer:hover{
      border-color:#FFD700;
      box-shadow:0 0 18px rgba(255,215,0,0.35);
    }

    .hero-card{
      border-radius:22px;
      background:radial-gradient(circle at top,#232323,#050505);
      border:1px solid rgba(255,215,0,0.7);
      box-shadow:
        0 0 22px rgba(0,0,0,0.9),
        0 0 26px rgba(255,215,0,0.4);
      padding:20px 18px 18px;
    }
    .hero-mini{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(255,215,0,0.8);
      padding:16px 12px 14px;
      background:linear-gradient(140deg,#141414,#050505);
      text-align:center;
      margin-bottom:10px;
    }
    .hero-mini-logo{
      width:80px;
      height:80px;
      border-radius:18px;
      border:2px solid #FFD700;
      margin:0 auto 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      color:#FFD700;
      font-weight:bold;
      font-size:0.8rem;
      box-shadow:0 0 16px rgba(255,215,0,0.6);
    }
    .hero-mini-buttons{
      display:flex;
      justify-content:center;
      gap:8px;
      margin-top:8px;
      flex-wrap:wrap;
    }
    .mini-btn{
      width:34px;
      height:34px;
      border-radius:10px;
      border:1px solid rgba(255,215,0,0.9);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:0.75rem;
      color:#FFE88A;
      background:rgba(0,0,0,0.9);
    }
    .hero-note{
      font-size:0.75rem;
      color:#b5b5b5;
      margin-top:6px;
      text-align:center;
    }

    /* SECTIONS */
    section{ padding:28px 0 8px; }
    h2.section-title{
      font-size:1.6rem;
      margin-bottom:12px;
    }
    .section-sub{
      font-size:0.95rem;
      color:#d0d0d0;
      margin-bottom:18px;
    }

    /* HOW IT WORKS */
    .steps{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
    }
    .step{
      background:rgba(10,10,10,0.92);
      padding:14px 14px 16px;
      border-radius:14px;
      border:1px solid #2b2b2b;
      box-shadow:0 0 10px rgba(0,0,0,0.7);
    }
    .step-title{
      font-weight:bold;
      margin-bottom:6px;
      color:#FFE88A;
    }
    .step-num{
      font-size:0.75rem;
      opacity:0.9;
      margin-bottom:2px;
      color:#bfbfbf;
    }
    .step p{
      font-size:0.86rem;
      color:#e2e2e2;
    }

    /* BENEFITS */
    .benefits{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:16px;
    }
    .benefit{
      background:rgba(8,8,8,0.96);
      border-radius:14px;
      border:1px solid #262626;
      padding:14px;
      box-shadow:0 0 12px rgba(0,0,0,0.85);
    }
    .benefit h3{
      font-size:1rem;
      margin-bottom:6px;
      color:#FFE88A;
    }
    .benefit p{
      font-size:0.86rem;
      color:#e0e0e0;
    }

    /* EXAMPLES */
    .examples{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:16px;
    }
    .example-card{
      background:rgba(10,10,10,0.94);
      border-radius:14px;
      border:1px solid #2a2a2a;
      padding:14px;
      box-shadow:0 0 12px rgba(0,0,0,0.75);
    }
    .example-top{
      font-size:0.8rem;
      color:#b3b3b3;
      margin-bottom:6px;
    }
    .example-name{
      font-weight:bold;
      margin-bottom:6px;
      color:#FFE88A;
    }
    .example-link{
      font-size:0.85rem;
      color:#FFD700;
      word-break:break-all;
    }

    /* ÚJ: AJÁNLATKÉRÉS (árak/kosár helyett) */
    .offers{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:16px;
    }
    .offer-card{
      background:rgba(7,7,7,0.96);
      border-radius:14px;
      border:1px solid rgba(255,215,0,0.6);
      padding:16px;
      position:relative;
      overflow:hidden;
      box-shadow:
        0 0 18px rgba(0,0,0,0.9),
        0 0 18px rgba(255,215,0,0.25);
    }
    .offer-tag{
      position:absolute;
      right:12px;
      top:10px;
      font-size:0.7rem;
      padding:2px 8px;
      border-radius:999px;
      background:#FFD700;
      color:#221700;
      font-weight:bold;
      text-transform:uppercase;
    }
    .offer-name{
      font-weight:bold;
      margin-bottom:6px;
      font-size:1rem;
    }
    .offer-desc{
      font-size:0.88rem;
      color:#e0e0e0;
      margin-bottom:10px;
    }
    .offer-list{
      font-size:0.82rem;
      color:#d8d8d8;
      margin-left:14px;
    }
    .offer-actions{
      margin-top:12px;
      display:flex;
      justify-content:flex-end;
    }

    /* VIDEO */
    .video-card{
      margin-top:10px;
      border-radius:18px;
      background:rgba(8,8,8,0.97);
      border:1px solid rgba(255,215,0,0.65);
      box-shadow:
        0 0 16px rgba(0,0,0,0.9),
        0 0 18px rgba(255,215,0,0.2);
      padding:16px;
    }
    .video-title{
      font-size:1.25rem;
      margin-bottom:6px;
      color:#FFE88A;
      font-weight:bold;
    }
    .video-sub{
      font-size:0.95rem;
      color:#d6d6d6;
      margin-bottom:12px;
    }
    .video-wrap{
      width:100%;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,215,0,0.5);
      background:#000;
      /* mobilon is szép arány */
      aspect-ratio: 16 / 9;
    }

    /* régi video tag maradhatna, de YouTube-nál iframe kell */
    .video-wrap iframe{
      width:100%;
      height:100%;
      display:block;
      border:0;
    }

    .video-note{
      margin-top:10px;
      font-size:0.8rem;
      color:#b8b8b8;
      line-height:1.45;
    }

    /* CONTACT */
    .contact-grid{
      display:grid;
      grid-template-columns:1.1fr 1fr;
      gap:20px;
      align-items:flex-start;
    }
    @media (max-width:800px){
      .contact-grid{ grid-template-columns:1fr; }
    }
    .contact-text{
      font-size:0.9rem;
      color:#e4e4e4;
    }
    .contact-box{
      background:rgba(8,8,8,0.97);
      border-radius:14px;
      border:1px solid rgba(255,215,0,0.6);
      padding:14px;
      box-shadow:0 0 16px rgba(0,0,0,0.85);
    }
    .contact-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:10px;
    }
    .contact-small{
      font-size:0.8rem;
      color:#b3b3b3;
      margin-top:6px;
    }

    footer{
      text-align:center;
      font-size:0.75rem;
      color:#8a8a8a;
      padding:16px 0 0;
    }
  </style>
</head>

function setLanguage(lang) {
  const map = texts[lang];
  if (!map) return;

  currentLang = lang;
  document.documentElement.lang = lang;

  for (const key in map) {
    const el = document.querySelector('[data-i18n="'+key+'"]');
    if (el) el.innerHTML = map[key];
  }

  document.getElementById('btn-hu').classList.toggle('active', lang === 'hu');
  document.getElementById('btn-ro').classList.toggle('active', lang === 'ro');

  refreshOfferButtons();
}
